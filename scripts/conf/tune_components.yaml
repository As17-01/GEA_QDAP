defaults:
  - gea
  - _self_

tune:
  runs: 30
  n_candidates: 30
  seed: 0
  components_path: conf/components/common.yaml
  output_file: results/tune_components_${now:%Y%m%d_%H%M%S}.json
  # [low, high] bounds for Optuna's TPE sampler to search continuously, rather than a fixed
  # grid -- TPE models which region of each range tends to score well and concentrates later
  # trials there, instead of sampling blindly.
  param_space:
    repair_class.subsample_size: [0.2, 0.8]
    selector.beta: [5.0, 20.0]
    selector.diversity_weight_start: [0.5, 0.9]
    selector.diversity_weight_end: [0.05, 0.3]
    selector.elite_fraction: [0.15, 0.5]
