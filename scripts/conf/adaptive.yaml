defaults:
  - datasets: common
  - _self_

hydra:
  run:
    dir: .
  job:
    chdir: false

ga:
  _target_: src.algos.ga_adaptive.AdaptiveGA
  population_size: 350
  iterations: 1000
  crossover_rate: 0.7
  mutation_rate: 0.3
  alpha: 0.01
  lambda_min: 0.4
  lambda_max: 1.5
  epsilon: 1e-5

run:
  runs: 1
  time_limit: 1000

output_file: results/adaptive.json
