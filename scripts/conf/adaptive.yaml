defaults:
  - datasets: common
  - components@ga: common
  - _self_

hydra:
  run:
    dir: .
  job:
    chdir: false

ga:
  _target_: src.algos.ga_adaptive.AdaptiveGA
  population_size: 350
  iterations: 1000
  crossover_rate: 0.7
  mutation_rate: 0.3
  alpha: 0.01
  lambda_min: 0.4
  lambda_max: 1.5
  epsilon: 1e-5

run:
  runs: 30
  time_limit: 1000
  # Mirrors run_test.sbatch's NUM_WORKERS env var (set there alongside pinning
  # OMP/MKL/OPENBLAS/NUMEXPR to 1 thread each, so this multiprocessing pool is the only
  # thing using all the allocated cores). Falls back to 4 for ad-hoc local runs.
  workers: ${oc.env:NUM_WORKERS,4}

output_file: results/adaptive.json
