# @package _global_
defaults:
  - /hybrid_ga_pso
  - _self_

tune:
  runs: 30
  n_candidates: 30
  seed: 0
  ga_path: conf/hybrid_ga_pso.yaml
  output_file: results/tune_algorithm_hybrid_ga_pso_${now:%Y%m%d_%H%M%S}.json
  param_space:
    pso_fraction: [0.2, 0.8]
    inertia_weight: [0.1, 0.6]
    cognitive_weight: [0.1, 0.5]
    social_weight: [0.1, 0.5]
    crossover_rate: [0.4, 0.9]
    mutation_rate: [0.1, 0.6]
    stagnation_limit: [10, 60]
    immigrant_rate: [0.02, 0.3]
