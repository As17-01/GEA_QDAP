# @package _global_
defaults:
  - /hybrid_ga_sa
  - _self_

tune:
  runs: 30
  n_candidates: 30
  seed: 0
  ga_path: conf/hybrid_ga_sa.yaml
  output_file: results/tune_algorithm_hybrid_ga_sa_${now:%Y%m%d_%H%M%S}.json
  param_space:
    crossover_rate: [0.4, 0.9]
    mutation_rate: [0.1, 0.6]
    initial_temperature: [10.0, 200.0]
    cooling_rate: [0.90, 0.995]
    min_temperature: [0.0001, 0.01]
    stagnation_limit: [10, 60]
    immigrant_rate: [0.02, 0.3]
