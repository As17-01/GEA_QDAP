# @package _global_
defaults:
  - /improved_ga
  - _self_

tune:
  runs: 30
  n_candidates: 30
  seed: 0
  ga_path: conf/improved_ga.yaml
  output_file: results/tune_algorithm_improved_ga_${now:%Y%m%d_%H%M%S}.json
  param_space:
    crossover_rate: [0.4, 0.9]
    mutation_rate: [0.1, 0.6]
    stagnation_limit: [10, 60]
    immigrant_rate: [0.02, 0.3]
